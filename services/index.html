
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crorepati Quiz Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        :root {
            --gold: #d4af37;
            --kbc-blue: #000428;
            --kbc-light-blue: #004e92;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--kbc-blue);
            margin: 0;
            overflow: hidden;
            color: white;
        }

        .kbc-bg {
            background: radial-gradient(circle at center, var(--kbc-light-blue) 0%, var(--kbc-blue) 100%);
            min-height: 100vh;
        }

        .gold-border {
            border: 2px solid var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .gold-text {
            color: var(--gold);
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option-button {
            position: relative;
            background: rgba(0, 0, 0, 0.7);
            border: 1.5px solid var(--gold);
            clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-selected {
            background: linear-gradient(to right, #92660b, #e0b04b);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .option-correct {
            background: linear-gradient(to right, #14532d, #22c55e) !important;
            border-color: #fff !important;
            box-shadow: 0 0 25px #22c55e;
        }

        .option-wrong {
            background: linear-gradient(to right, #7f1d1d, #ef4444) !important;
            border-color: #fff !important;
            box-shadow: 0 0 25px #ef4444;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }

        @keyframes timer-critical-aggressive {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px #ff0000); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 35px #ff0000); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px #ff0000); }
        }
        .animate-timer-critical { animation: timer-critical-aggressive 0.5s infinite; }

        @keyframes speaking-glow {
            0%, 100% { box-shadow: 0 0 15px var(--gold); transform: scale(1); }
            50% { box-shadow: 0 0 40px white; transform: scale(1.05); }
        }
        .animate-speaking { animation: speaking-glow 0.8s infinite ease-in-out; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
    <script type="importmap">
{

</head>

</html>
